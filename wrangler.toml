name = "this-day-even"
main = "server/index.ts"
compatibility_date = "2026-04-22"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[vars]
APP_NAME = "This Day"
APP_BASE_URL = "https://this-day-even.plungarini.workers.dev"
OPENROUTER_SCORER_MODEL = "google/gemini-3.1-flash-lite-preview"
OPENROUTER_WRITER_MODEL = "google/gemini-3.1-pro-preview"
OPENROUTER_SCORER_THINKING = "low"
OPENROUTER_WRITER_THINKING = "medium"
ACCESS_PHASE = "free"
TRIAL_DAYS = "7"
PAYMENTS_PROVIDER = ""

[[kv_namespaces]]
binding = "THIS_DAY_KV"
id = "c5f33b3598c94d46a20a9813e7481101"
preview_id = "1f12c53cf80c4fa28c02c955aae08954"

[[d1_databases]]
binding = "THIS_DAY_DB"
database_name = "this-day-db"
database_id = "ceab76c3-75e9-40a6-81d7-4273960b8509"
preview_database_id = "ceab76c3-75e9-40a6-81d7-4273960b8509"

[triggers]
crons = ["0 0 * * *"]

